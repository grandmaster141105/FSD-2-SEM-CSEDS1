<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            text-align: center;
            width: 300px;
        }

        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        button {
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: skyblue;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <input type="number" id="temp" placeholder="Enter temperature">

    <select id="unit">
        <option value="C">Celsius</option>
        <option value="F">Fahrenheit</option>
        <option value="K">Kelvin</option>
    </select>

    <button onclick="convertTemperature()">Convert</button>

    <div id="result"></div>
</div>

<script>
function convertTemperature() {
    let temp = Number(document.getElementById("temp").value);
    let unit = document.getElementById("unit").value;
    let result = "";
    

    if (unit === "C") {
        let f = (temp * 9/5) + 32;
        let k = temp + 273.15;
        result = `${temp} °C = ${f.toFixed(2)} °F<br>${k.toFixed(2)} K`;
    }
    else if (unit === "F") {
        let c = (temp - 32) * 5/9;
        let k = c + 273.15;
        result = `${temp} °F = ${c.toFixed(2)} °C<br>${k.toFixed(2)} K`;
    }
    else if (unit === "K") {
        let c = temp - 273.15;
        let f = (c * 9/5) + 32;
        result = `${temp} K = ${c.toFixed(2)} °C<br>${f.toFixed(2)} °F`;
    }

    document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
